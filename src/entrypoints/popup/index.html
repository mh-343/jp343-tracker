<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jp343 Tracker</title>
  <script src="/theme-init.js"></script>
  <link rel="stylesheet" href="../../styles/color-themes.css">
  <link rel="stylesheet" href="./popup.css">
</head>
<body>
  <div class="header">
    <div style="display: flex; align-items: center; gap: 8px;">
      <h1>jp343 Tracker</h1>
      <div class="status-indicator" id="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Idle</span>
      </div>
    </div>
    <div class="toggle-container" style="display: flex; align-items: center; gap: 6px;">
      <button class="theme-toggle-popup" id="themeTogglePopup" title="Toggle theme">&#9790;</button>
      <span class="toggle-label on" id="toggleLabel">ON</span>
      <input type="checkbox" class="toggle-switch" id="toggleEnabled" role="switch" checked title="Enable/Disable tracking">
    </div>
  </div>

  <div class="popup-content">
  <div class="session-card" id="sessionCard">
    <div class="no-session" id="noSession">
      <p id="noSessionTitle">No active session</p>
      <p class="hint" id="noSessionHint">Visit a supported streaming site to start tracking</p>
    </div>

    <!-- Manual tracking mode -->
    <div id="manualTrackMode" style="display: none;">
      <div class="manual-track-header">
        <span class="manual-track-domain" id="currentDomain">example.com</span>
      </div>

      <div class="manual-track-input">
        <label for="manualTitle">Title</label>
        <input type="text" id="manualTitle" placeholder="Enter a title..." />
      </div>

      <div class="manual-track-input">
        <label for="activityType">Type</label>
        <select id="activityType">
          <option value="watching">Watching</option>
          <option value="listening">Listening</option>
          <option value="reading">Reading</option>
          <option value="speaking">Speaking</option>
        </select>
      </div>

      <button class="btn btn-primary btn-track" id="btnStartManual">
        Track This Page
      </button>
    </div>

    <div id="activeSession" style="display: none;">
      <div class="session-info">
        <div class="session-thumbnail placeholder" id="thumbnail">
          <span id="platformIcon"></span>
        </div>
        <div class="session-details">
          <div class="session-title-row">
            <div class="session-title" id="sessionTitle">Video Title</div>
            <button class="session-title-edit" id="btnEditTitle" title="Edit title">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
              </svg>
            </button>
          </div>
          <div class="session-platform" id="sessionPlatform">youtube.com</div>
        </div>
      </div>

      <div class="session-timer" id="sessionTimer">
        0m 0s
        <span class="ad-label" id="adLabel" style="display: none;">Ad detected - paused</span>
      </div>

      <div class="button-row">
        <button class="btn btn-secondary" id="btnPause">Pause</button>
        <button class="btn btn-danger" id="btnStop">Stop & Save</button>
      </div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <span class="stat-label">This Week</span>
      <span class="stat-value" id="statWeek">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Today</span>
      <span class="stat-value" id="statToday">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Streak</span>
      <span class="stat-value stat-streak" id="statStreak">—</span>
    </div>
  </div>

  <div class="goal-micro-bar" id="goalMicroBar" title="Daily goal progress">
    <div class="goal-micro-fill" id="goalMicroFill" style="width:0%"></div>
  </div>

  <!-- Mini week bars: Mon-Sun, populated via renderWeekBars() in main.ts -->
  <div class="week-bars" id="weekBars"></div>

  <div class="channel-section" id="channelSection" style="display: none;">
    <div class="channel-info">
      <span class="channel-name"><span id="channelLabel">Channel</span>: <strong id="currentChannelName">-</strong></span>
      <button class="btn-block" id="btnBlockChannel">Block</button>
      <button class="btn-allow" id="btnAllowChannel" style="display: none;" title="Always track this channel (whitelist)">Allow</button>
    </div>
  </div>

  <div class="spotify-filter-section" id="spotifyFilterSection" style="display: none;">
    <span class="spotify-filter-label">Track:</span>
    <div class="spotify-filter-chips">
      <button class="spotify-chip active" data-type="music">Music</button>
      <button class="spotify-chip active" data-type="podcast">Podcasts</button>
      <button class="spotify-chip active" data-type="audiobook">Audiobooks</button>
    </div>
  </div>

  <div class="pending-section" id="pendingSection" style="display: none;">
    <div class="pending-header" id="pendingHeader">
      <span>Sessions</span>
      <span class="pending-collapse-arrow" id="pendingCollapseArrow">&#x25BE;</span>
    </div>
    <div class="pending-list" id="pendingList"></div>
  </div>
  </div><!-- /popup-content -->

  <div class="footer">
    <div class="footer-actions">
      <button class="btn-dashboard" id="btnDashboard">Dashboard</button>
      <button class="btn-gear" id="btnSettings" title="Settings"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
      <button class="jp-toggle" id="btnJpFilter" title="JP mode: Off" style="display: none;"><svg width="28" height="19" viewBox="0 0 30 20"><rect width="30" height="20" rx="2" fill="white"/><circle class="flag-circle" cx="15" cy="10" r="5"/></svg></button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
