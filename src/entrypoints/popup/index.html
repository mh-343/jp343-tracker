<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP343 Tracker</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --text-primary: #e8e8e8;
      --text-secondary: #a0a0a0;
      --accent: #875aff;
      --accent-hover: #9d7aff;
      --success: #4caf50;
      --warning: #ff9800;
      --danger: #f44336;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      min-height: 200px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--bg-tertiary);
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
    }

    .status-dot.recording {
      background: var(--danger);
      animation: pulse 1.5s infinite;
    }

    .status-dot.paused {
      background: var(--warning);
    }

    .status-dot.ad {
      background: var(--warning);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Session Card */
    .session-card {
      padding: 16px;
    }

    .no-session {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-secondary);
    }

    .no-session p {
      margin-bottom: 8px;
    }

    .no-session .hint {
      font-size: 12px;
      opacity: 0.7;
    }

    .session-info {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .session-thumbnail {
      width: 80px;
      height: 45px;
      border-radius: 4px;
      background: var(--bg-tertiary);
      object-fit: cover;
    }

    .session-thumbnail.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .session-details {
      flex: 1;
      min-width: 0;
    }

    .session-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .session-platform {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .session-timer {
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .session-timer.ad {
      color: var(--warning);
    }

    .session-timer .ad-label {
      display: block;
      font-size: 11px;
      color: var(--warning);
      margin-top: 4px;
    }

    /* Buttons */
    .button-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: #1a4a7a;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #d32f2f;
    }

    /* Pending Section */
    .pending-section {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--bg-tertiary);
    }

    .pending-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .pending-count {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .pending-count strong {
      color: var(--accent);
    }

    .btn-sync {
      padding: 6px 12px;
      font-size: 12px;
    }

    .sync-hint {
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    /* Pending Entries Liste */
    .pending-list {
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .pending-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      margin-bottom: 4px;
      background: var(--bg-tertiary);
      border-radius: 4px;
    }

    .pending-entry-thumb {
      width: 48px;
      height: 27px;
      border-radius: 2px;
      background: var(--bg-primary);
      object-fit: cover;
    }

    .pending-entry-info {
      flex: 1;
      min-width: 0;
    }

    .pending-entry-title {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pending-entry-meta {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .pending-entry-delete {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .pending-entry-delete:hover {
      background: var(--danger);
      color: white;
    }

    /* Synced Entry Styles */
    .pending-entry.synced {
      opacity: 0.6;
      background: var(--bg-primary);
    }

    .pending-entry-status {
      font-size: 10px;
      margin-left: auto;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .pending-entry-status.synced {
      background: var(--success);
      color: white;
    }

    .pending-entry-status.failed {
      background: var(--danger);
      color: white;
    }

    .pending-entry-status.pending {
      background: var(--warning);
      color: #1a1a2e;
    }

    /* Clear Synced Button */
    .btn-clear {
      padding: 6px 12px;
      font-size: 12px;
      margin-right: 8px;
    }

    .pending-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .pending-header-buttons {
      display: flex;
      gap: 4px;
    }

    /* Footer */
    .footer {
      padding: 8px 16px;
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      border-top: 1px solid var(--bg-tertiary);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>JP343 Tracker</h1>
    <div class="status-indicator" id="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Idle</span>
    </div>
  </div>

  <div class="session-card" id="sessionCard">
    <div class="no-session" id="noSession">
      <p>No active session</p>
      <p class="hint">Visit YouTube or Netflix to start tracking</p>
    </div>

    <div id="activeSession" style="display: none;">
      <div class="session-info">
        <div class="session-thumbnail placeholder" id="thumbnail">
          <span id="platformIcon"></span>
        </div>
        <div class="session-details">
          <div class="session-title" id="sessionTitle">Video Title</div>
          <div class="session-platform" id="sessionPlatform">youtube.com</div>
        </div>
      </div>

      <div class="session-timer" id="sessionTimer">
        0m 0s
        <span class="ad-label" id="adLabel" style="display: none;">Ad detected - paused</span>
      </div>

      <div class="button-row">
        <button class="btn btn-secondary" id="btnPause">Pause</button>
        <button class="btn btn-danger" id="btnStop">Stop & Save</button>
      </div>
    </div>
  </div>

  <div class="pending-section" id="pendingSection" style="display: none;">
    <div class="pending-header">
      <span class="pending-count">
        <strong id="pendingCount">0</strong> pending (<strong id="pendingMinutes">0</strong>m) · <span id="syncedCount">0</span> synced
      </span>
      <div class="pending-header-buttons">
        <button class="btn btn-secondary btn-clear" id="btnClear" style="display: none;">Clear Synced</button>
        <button class="btn btn-primary btn-sync" id="btnSync">Sync Now</button>
      </div>
    </div>
    <div class="pending-list" id="pendingList"></div>
    <div class="sync-hint">Visit JP343 to sync your data</div>
  </div>

  <div class="footer">
    <a href="https://jp343.com" target="_blank">Open JP343</a>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
